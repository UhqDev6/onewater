name: Ingest Beachwatch Snapshots

# Trigger otomatis dan manual
on:
  schedule:
    # Berjalan otomatis setiap 6 jam (jam 00:00, 06:00, 12:00, 18:00 UTC)
    # UTC = WIB - 7 jam, jadi ini = 07:00, 13:00, 19:00, 01:00 WIB
    - cron: '0 */6 * * *'
  
  workflow_dispatch: # Tombol manual trigger dari GitHub web UI
    inputs:
      dryRun:
        description: 'Dry run mode (check stats only, no ingestion)'
        required: false
        type: boolean
        default: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🚀 Trigger Snapshot Ingestion
        id: ingestion
        run: |
          echo "Starting beachwatch snapshot ingestion..."
          
          # Tentukan URL berdasarkan dry run mode
          if [ "${{ github.event.inputs.dryRun }}" = "true" ]; then
            URL="https://onewater.vercel.app/api/cron/ingest-snapshots?dryRun=true"
            echo "Mode: Dry Run (stats only)"
          else
            URL="https://onewater.vercel.app/api/cron/ingest-snapshots"
            echo "Mode: Full Ingestion"
          fi
          
          # Panggil API endpoint
          RESPONSE=$(curl -s -w "\n%{http_code}" "$URL")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response Body:"
          echo "$BODY" | jq '.' || echo "$BODY"
          
          # Check if successful
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Ingestion completed successfully"
            exit 0
          else
            echo "❌ Ingestion failed with HTTP $HTTP_CODE"
            exit 1
          fi
      
      - name: 📊 Log Summary
        if: always()
        run: |
          echo "================================================"
          echo "Beachwatch Snapshot Ingestion Summary"
          echo "================================================"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run Number: ${{ github.run_number }}"
          echo "Triggered by: ${{ github.event_name }}"
          echo "Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "================================================"
